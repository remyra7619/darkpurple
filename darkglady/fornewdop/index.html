<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ P2P Чат · Гипсик</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #080c16;
            font-family: 'Segoe UI', monospace;
            color: #d0ece4;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            background: rgba(8,16,28,0.92);
            border: 2px solid #2affb6;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 0 50px rgba(42,255,182,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f3f3a;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        .header h1 {
            background: linear-gradient(135deg, #2affb6, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
        }
        .status {
            font-size: 13px;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #2a5a4a;
            color: #7fa89a;
        }
        .status.online { border-color: #2affb6; color: #b0ffe0; }
        .peer-id-box {
            background: #0f1e24;
            border-radius: 16px;
            padding: 12px 18px;
            margin-bottom: 16px;
            border: 1px solid #1a2f2a;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .peer-id-box input {
            flex: 1;
            background: #0b141c;
            border: 1px solid #1f3f3a;
            border-radius: 40px;
            padding: 10px 18px;
            color: #d0ece4;
            font-family: inherit;
            outline: none;
            min-width: 120px;
        }
        .peer-id-box input:focus { border-color: #2affb6; }
        .btn {
            background: transparent;
            border: 1px solid #2affb6;
            color: #b0ffe0;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
        }
        .btn:hover {
            background: #2affb6;
            color: #080c16;
            box-shadow: 0 0 30px #2affb6;
        }
        .btn-primary {
            background: #2affb6;
            color: #080c16;
            border: none;
        }
        .btn-primary:hover { box-shadow: 0 0 40px #2affb6; }
        .messages {
            background: #0b141c;
            border-radius: 20px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #1a2f2a;
            margin: 16px 0;
        }
        .msg {
            padding: 8px 14px;
            margin-bottom: 6px;
            border-radius: 12px;
            background: #0f1e24;
            border: 1px solid #1a2f2a;
            display: flex;
            gap: 12px;
            align-items: baseline;
        }
        .msg .user { font-weight: 600; color: #b3ffd9; }
        .msg .user.me { color: #7fffd4; }
        .msg .text { color: #d0ece4; word-break: break-word; }
        .msg .time { font-size: 11px; color: #4a7a6a; margin-left: auto; }
        .input-area {
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            background: #0b141c;
            border: 1px solid #1f3f3a;
            border-radius: 60px;
            padding: 12px 20px;
            color: #d0ece4;
            font-family: inherit;
            outline: none;
        }
        .input-area input:focus { border-color: #2affb6; }
        .user-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .user-tag {
            background: #0f1e24;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #1a2f2a;
            font-size: 13px;
            color: #8fb0a0;
        }
        .user-tag.online { border-color: #2affb6; color: #b3ffd9; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>⚡ P2P Чат</h1>
        <span class="status" id="statusBadge">🔄 Подключение...</span>
    </div>

    <div class="peer-id-box">
        <span style="color:#6a8f7a;">Твой ID:</span>
        <input type="text" id="myPeerId" readonly style="flex:1; background:#0b141c; border:1px solid #1f3f3a; border-radius:40px; padding:10px 18px; color:#b3ffd9; font-family:inherit; outline:none;" />
        <button class="btn" onclick="copyPeerId()">📋 Копировать</button>
    </div>

    <div>
        <span style="color:#6a8f7a; font-size:14px;">Подключиться к собеседнику:</span>
        <div style="display:flex; gap:10px; margin-top:6px; flex-wrap:wrap;">
            <input type="text" id="targetPeerId" placeholder="Введите ID собеседника..." style="flex:1; background:#0b141c; border:1px solid #1f3f3a; border-radius:40px; padding:10px 18px; color:#d0ece4; font-family:inherit; outline:none; min-width:150px;" />
            <button class="btn btn-primary" onclick="connectToPeer()">🔗 Подключиться</button>
        </div>
    </div>

    <div class="user-list" id="userList">
        <span class="user-tag online">🟢 Вы (онлайн)</span>
    </div>

    <div class="messages" id="messagesContainer">
        <div class="msg"><span class="user">⚡ Система</span><span class="text">Ожидание подключения...</span></div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Введите сообщение..." />
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // =============================================
    //  PEER.JS — МНОГОПОЛЬЗОВАТЕЛЬСКИЙ ЧАТ
    // =============================================

    let peer = null;
    let connections = {}; // все подключения
    let myId = '';
    let myName = '';

    // --- Инициализация ---
    function initPeer() {
        // Генерируем случайное имя пользователя
        const names = ['Гипсик', 'Нейро', 'Линк', 'Тень', 'Кодер', 'Меценат', 'Странник', 'Ворон', 'Феникс', 'Дракон'];
        myName = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
        
        // Создаём Peer
        peer = new Peer(undefined, {
            debug: 2
        });

        // Получаем ID
        peer.on('open', (id) => {
            myId = id;
            document.getElementById('myPeerId').value = id;
            document.getElementById('statusBadge').textContent = '🟢 Онлайн';
            document.getElementById('statusBadge').className = 'status online';
            addSystemMessage(`✅ Ваш ID: ${id}`);
            addSystemMessage(`👤 Вы вошли как: ${myName}`);
        });

        // Обработка входящих подключений
        peer.on('connection', (conn) => {
            addConnection(conn);
        });

        peer.on('error', (err) => {
            console.error('Ошибка Peer:', err);
            addSystemMessage(`❌ Ошибка: ${err.message}`);
        });

        // Сохраняем peer в глобальный доступ
        window.peer = peer;
    }

    // --- Подключение к другому пользователю ---
    function connectToPeer() {
        const targetId = document.getElementById('targetPeerId').value.trim();
        if (!targetId) {
            addSystemMessage('⚠️ Введите ID собеседника');
            return;
        }
        if (targetId === myId) {
            addSystemMessage('⚠️ Нельзя подключиться к самому себе');
            return;
        }

        // Проверяем, не подключены ли уже
        if (connections[targetId]) {
            addSystemMessage(`ℹ️ Уже подключены к $etId}`);
            return;
        }

        addSystemMessage(`🔗 Подключение к ${targetId}...`);
        
        const conn = peer.connect(targetId, {
            reliable: true
        });

        conn.on('open', () => {
            addConnection(conn);
        });

        conn.on('error', (err) => {
            addSystemMessage(`❌ Ошибка подключения: ${err.message}`);
        });
    }

    // --- Добавление соединения ---
    function addConnection(conn) {
        const peerId = conn.peer;
        
        if (connections[peerId]) {
            addSystemMessage(`ℹ️ Уже подключены к ${peerId}`);
            return;
        }

        connections[peerId] = conn;
        addSystemMessage(`✅ Подключено к ${peerId}`);
        updateUserList();

        // Отправляем приветствие
        conn.send({
            type: 'system',
            text: `${myName} присоединился к чату`,
            user: myName
        });

        // Обработка входящих сообщений
        conn.on('data', (data) => {
            handleMessage(data, peerId);
        });

        conn.on('close', () => {
            delete connections[peerId];
            addSystemMessage(`🔴 ${peerId} отключился`);
            updateUserList();
        });

        conn.on('error', (err) => {
            console.error('Ошибка соединения:', err);
            delete connections[peerId];
            updateUserList();
        });
    }

    // --- Обработка сообщений ---
    function handleMessage(data, fromPeer) {
        console.log('Получено:', data, 'от:', fromPeer);
        
        if (data.type === 'system') {
            addSystemMessage(data.text);
            return;
        }

        if (data.type === 'message') {
            addMessage(data.user || 'Аноним', data.text, false);
            return;
        }

        if (data.type === 'name') {
            // Обновляем имя пользователя
            addSystemMessage(`📝 ${data.oldName} → ${data.newName}`);
            updateUserList();
            return;
        }
    }

    // --- Отправка сообщения ---
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        // Показываем у себя
        addMessage(myName, text, true);

        // Отправляем всем
        const msgData = {
            type: 'message',
            user: myName,
            text: text
        };

        for (let id in connections) {
            try {
                connections[id].send(msgData);
            } catch (e) {
                console.warn('Не удалось отправить:', e);
            }
        }

        input.value = '';
        input.focus();
    }

    // --- UI: Добавить сообщение ---
    function addMessage(user, text, isOwn = false) {
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `
            <span class="user ${isOwn ? 'me' : ''}">${user}</span>
            <span class="text">${text}</span>
            <span class="time">${new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</span>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(text) {
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = 'msg';
        div.style.background = '#0a1418';
        div.style.borderColor = '#1a2f2a';
        div.innerHTML = `
            <span class="user" style="color:#6a8f7a;">⚡ Система</span>
            <span class="text" style="color:#8fb0a0; font-style:italic;">${text}</span>
            <span class="time">${new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</span>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // --- UI: Список пользователей ---
    function updateUserList() {
        const container = document.getElementById('userList');
        container.innerHTML = `<span class="user-tag online">🟢 Вы (${myName})</span>`;
        
        for (let id in connections) {
            const tag = document.createElement('span');
            tag.className = 'user-tag online';
            // Пытаемся получить имя из данных (если есть)
            const name = connections[id]._data?.user || id.slice(0, 8);
            tag.textContent = `🟢 ${name}`;
            container.appendChild(tag);
        }
    }

    // --- Копировать ID ---
    function copyPeerId() {
        const input = document.getElementById('myPeerId');
        input.select();
        document.execCommand('copy');
        addSystemMessage('📋 ID скопирован в буфер обмена');
    }

    // --- Enter для отправки ---
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    document.getElementById('targetPeerId').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') connectToPeer();
    });

    // --- ЗАПУСК ---
    initPeer();

    // Обновляем список пользователей каждые 5 секунд
    setInterval(updateUserList, 5000);
</script>

</body>
</html>
