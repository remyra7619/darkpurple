<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>
⚡ P2P Чат · Гипсик</title>
 <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
 <style>
 * { margin:0; padding:0; box-sizing:border-box; }
 body {
 background: #080c16;
 font-family: 'Segoe UI', monospace;
 color: #d0ece4;
 padding: 20px;
 min-height: 100vh;
 display:
flex;
 justify-content: center;
 align-items: center;
 }
 .chat-container {
 max-width: 800px;
 width: 100%;
 background: rgba(8,16,28,0.92);
 border: 2px solid #2affb6;
 border-radius: 32px;
 padding: 28px;
 box-shadow: 0 0 50px rgba(42,255,182,0.1);
 }
 .header {
 display:
flex;

 justify-content: space-between;
 align-items: center;
 border-bottom: 1px solid #1f3f3a;
 padding-bottom: 16px;
 margin-bottom: 20px;

flex-wrap: wrap;
 gap: 10px;
 }
 .header h1 {
 background: linear-gradient(135deg, #2affb6, #00d4ff);
 -webkit-background-clip: text;
 -webkit-textfill-color: transparent;
 font-size: 24px;
 }
 .status {
 font-size: 13px;
 padding: 6px 18px;
 border-radius: 40px;
 border: 1px solid #2a5a4a;
 color: #7fa89a;
 transition: 0.3s;
 }
 .status.online { border-color: #2affb6; color: #b0ffe0; background:
rgba(42,255,182,0.1); }
 .status.error { border-color: #ff6b6b; color: #ff8a8a; }
 .peer-id-box {
 background: #0f1e24;
 border-radius: 16px;
 padding: 12px 18px;
 margin-bottom: 16px;
 border: 1px solid #1a2f2a;

 display:
flex;
 gap: 12px;
 align-items: center;

flex-wrap: wrap;
 }
 .peer-id-box input {

flex: 1;
 background: #0b141c;
 border: 1px solid #1f3f3a;
 border-radius: 40px;
 padding: 10px 18px;
 color: #d0ece4;
 font-family: inherit;
 outline: none;
 min-width: 120px;
 }
 .peer-id-box input:focus { border-color: #2affb6; }
 .btn {
 background: transparent;
 border: 1px solid #2affb6;
 color: #b0ffe0;
 padding: 10px 24px;
 border-radius: 60px;
 font-weight: 600;
 cursor: pointer;
 transition: 0.25s;
 font-family: inherit;
 }
 .btn:hover {
 background: #2affb6;
 color: #080c16;

 box-shadow: 0 0 30px rgba(42,255,182,0.3);
 }
 .btn-primary {
 background: #2affb6;
 color: #080c16;
 border: none;
 }
 .btn-primary:hover { box-shadow: 0 0 40px rgba(42,255,182,0.4); }
 .btn-danger {
 border-color: #ff6b6b;
 color: #ff8a8a;
 }
 .btn-danger:hover {
 background: #ff6b6b;
 color: #080c16;
 }
 .messages {
 background: #0b141c;
 border-radius: 20px;
 padding: 16px;
 height: 400px;
 over
flow-y: auto;
 border: 1px solid #1a2f2a;
 margin: 16px 0;
 }
 .msg {
 padding: 8px 14px;
 margin-bottom: 6px;
 border-radius: 12px;
 background: #0f1e24;
 border: 1px solid #1a2f2a;

 display:
flex;
 gap: 12px;
 align-items: baseline;
 animation: fadeMsg 0.3s ease;
 }
 @keyframes fadeMsg {
 0% { opacity: 0; transform: translateY(5px); }
 100% { opacity: 1; transform: translateY(0); }
 }
 .msg .user { font-weight: 600; color: #b3ffd9; }
 .msg .user.me { color: #7fffd4; }
 .msg .text { color: #d0ece4; word-break: break-word; }
 .msg .time { font-size: 11px; color: #4a7a6a; margin-left: auto; white-space:
nowrap; }
 .input-area {
 display:
flex;
 gap: 12px;
 }
 .input-area input {

flex: 1;
 background: #0b141c;
 border: 1px solid #1f3f3a;
 border-radius: 60px;
 padding: 12px 20px;
 color: #d0ece4;
 font-family: inherit;
 outline: none;
 }
 .input-area input:focus { border-color: #2affb6; }
 .input-area input:disabled { opacity: 0.4; cursor: not-allowed; }
 .user-list {

 display:
flex;
 gap: 8px;

flex-wrap: wrap;
 margin-bottom: 12px;
 padding: 10px;
 background: #0b141c;
 border-radius: 16px;
 border: 1px solid #1a2f2a;
 min-height: 44px;
 }
 .user-tag {
 padding: 4px 14px;
 border-radius: 40px;
 border: 1px solid #1a2f2a;
 font-size: 13px;
 color: #8fb0a0;
 }
 .user-tag.online { border-color: #2affb6; color: #b3ffd9; }
 .user-tag.of
fline { border-color: #4a3a3a; color: #6a5a5a; }
 .info-box {
 background: #0a1418;
 border-radius: 12px;
 padding: 12px 16px;
 border: 1px solid #1a2f2a;
 margin-bottom: 12px;
 font-size: 14px;
 color: #6a8f7a;
 }
 .info-box strong { color: #b3ffd9; }
 @media (max-width: 600px) {
 .chat-container { padding: 16px; }

 .peer-id-box {
flex-direction: column; }
 }
 </style>
</head>
<body>
<div class="chat-container">
 <div class="header">
 <h1>
⚡ P2P Чат</h1>
 <span class="status" id="statusBadge">🔄 Инициализация...</span>
 </div>
 <div class="info-box">

💡 <strong>Как работает:</strong> Скопируйте свой ID, отправьте
собеседнику. Он вставит ваш ID
в поле "Подключиться" —
и чат готов
!
 </div>
 <div class="peer-id-box">
 <span style="color:#6a8f7a;">🆔 Твой ID:</span>
 <input type="text" id="myPeerId" readonly style="
flex:1; background:#0b141c;
border:1px solid #1f3f3a; border-radius:40px; padding:10px 18px; color:#b3ffd9; fontfamily:inherit; outline:none;" placeholder="Загрузка..." />
 <button class="btn" onclick="copyPeerId()">📋 Копировать</button>
 <button class="btn btn-danger" onclick="resetConnection()"
title="Перезапустить соединение">🔄 </button>
 </div>
 <div>
 <span style="color:#6a8f7a; font-size:14px;">🔗 Подключиться
к
собеседнику:</span>

 <div style="display:
flex; gap:10px; margin-top:6px;
flex-wrap:wrap;">
 <input type="text" id="targetPeerId" placeholder="Введите ID
собеседника..." style="
flex:1; background:#0b141c; border:1px solid #1f3f3a; borderradius:40px; padding:10px 18px; color:#d0ece4; font-family:inherit; outline:none; minwidth:150px;" />
 <button class="btn btn-primary" onclick="connectToPeer()">🔗
Подключиться</button>
 </div>
 </div>
 <div class="user-list" id="userList">
 <span class="user-tag online">🟢 Вы (онлайн)</span>
 </div>
 <div class="messages" id="messagesContainer">
 <div class="msg"><span class="user">⚡ Система</span><span
class="text">Ожидание подключения...</span></div>
 </div>
 <div class="input-area">
 <input type="text" id="msgInput" placeholder="Введите сообщение..."
disabled />
 <button class="btn" id="sendBtn" onclick="sendMessage()" disabled>
➤</
button>
 </div>
</div>
<script>
 // =============================================
 // P2P ЧАТ
 //С ПОДДЕРЖКОЙ STUN/TURN
 // =============================================

 let peer = null;
 let connections = {};
 let myId = '';
 let myName = '';
 let isReady = false;
 let reconnectAttempts = 0;
 // --- Инициализация с правильными настройками ---
 function initPeer() {
 const status = document.getElementById('statusBadge');
 status.textContent = '🔄Подключение...';
 status.className = 'status';
 // Генерируем случайное имя
 const names = ['Гипсик', 'Нейро', 'Линк', 'Тень', 'Кодер', 'Меценат', 'Странник', 'Ворон', 'Феникс', 'Дракон', 'Самурай', 'Ниндзя'];
 myName = names[Math.floor(Math.random() * names.length)] +
Math.floor(Math.random() * 100);
 // ПРАВИЛЬНЫЕ НАСТРОЙКИ PEER.JS
 peer = new Peer(undefined, {
 debug: 2,
 config: {
 iceServers: [
 { urls: 'stun:stun.l.google.com:19302' },
 { urls: 'stun:stun1.l.google.com:19302' },
 { urls: 'stun:stun2.l.google.com:19302' },
 { urls: 'stun:stun3.l.google.com:19302' },
 { urls: 'stun:stun4.l.google.com:19302' },
 {urls: 'turn:turn.anyfirewall.com:443?transport=tcp',
 username: 'webrtc',
 credential: 'webrtc'
 },
 {
 urls: 'turn:turn.bistri.com:80',
 username: 'homeo',
 credential: 'homeo'
 }
 ]
 }
 });
 // --- СОБЫТИЯ PEER ---
 // Получение ID
 peer.on('open', (id) => {
 myId = id;
 document.getElementById('myPeerId').value = id;
 status.textContent = '🟢 Онлайн';
 status.className = 'status online';
 isReady = true;
 reconnectAttempts = 0;

 addSystemMessage(`
✅ Ваш ID: ${id}`);
 addSystemMessage(`
👤 Вы вошли как: ${myName}`);
 addSystemMessage(`
💡 Отправьте ваш ID собеседнику для
подключения`);

 // Активируем ввод

 document.getElementById('msgInput').disabled = false;
 document.getElementById('sendBtn').disabled = false;
 document.getElementById('msgInput').focus();
 });
 // Обработка входящих подключений
 peer.on('connection', (conn) => {
 handleIncomingConnection(conn);
 });
 // Ошибки
 peer.on('error', (err) => {
 console.error('Ошибка Peer:', err);

 // Не критичные ошибки (например, "ID занят")
 if (err.type === 'unavailable-id') {
 // Переподключаемся
с новым ID
 peer.destroy();
 setTimeout(() => initPeer(), 1000);
 return;
 }

 if (err.type === 'peer-unavailable') {
 addSystemMessage(`
❌ Пользователь не
в сети`);
 return;
 }
 status.textContent = '
❌ Ошибка';
 status.className = 'status error';
 addSystemMessage(`
❌ Ошибка: ${err.message || err}`);


 // Пытаемся переподключиться
 if (reconnectAttempts < 3) {
 reconnectAttempts++;
 setTimeout(() => {
 addSystemMessage(`
🔄 Попытка переподключения ($
{reconnectAttempts}/3)...`);
 peer.destroy();
 setTimeout(() => initPeer(), 2000);
 }, 3000);
 }
 });
 // При закрытии соединения
 peer.on('close', () => {
 isReady = false;
 status.textContent = '
🔴 Отключён';
 status.className = 'status';
 addSystemMessage('
🔴 Соединение разорвано');

 // Автоматическое переподключение
 if (reconnectAttempts < 3) {
 reconnectAttempts++;
 setTimeout(() => {
 addSystemMessage(`
🔄 Переподключение (${reconnectAttempts}/
3)...`);
 peer.destroy();
 setTimeout(() => initPeer(), 2000);
 }, 3000);
 }

 });
 // Сохраняем в глобальный доступ
 window.peer = peer;
 window.myName = myName;
 }
 // --- Обработка входящего подключения ---
 function handleIncomingConnection(conn) {
 const peerId = conn.peer;

 if (connections[peerId]) {
 addSystemMessage(`
ℹ Уже подключены
к ${peerId}`);
 return;
 }
 addSystemMessage(`
📞 Входящее подключение от ${peerId}...`);

 connections[peerId] = conn;
 updateUserList();
 // Настройка обработчиков
 setupConnectionHandlers(conn, peerId);

 // Отправляем приветствие
 conn.on('open', () => {
 conn.send({
 type: 'system',
 text: `${myName} присоединился
к чату`,
 user: myName

 });
 addSystemMessage(`
✅ ${peerId} подключился`);
 });
 }
 // --- Подключение к другому пользователю ---
 function connectToPeer() {
 const targetId = document.getElementById('targetPeerId').value.trim();
 if (!targetId) {
 addSystemMessage('
⚠ Введите ID собеседника');
 return;
 }
 if (targetId === myId) {
 addSystemMessage('
⚠ Нельзя подключиться
к самому себе');
 return;
 }
 if (connections[targetId]) {
 addSystemMessage(`
ℹ Уже подключены
к ${targetId}`);
 return;
 }
 if (!isReady) {
 addSystemMessage('
⏳ Подождите инициализации...');
 return;
 }
 addSystemMessage(`
🔗 Подключение
к ${targetId}...`);

 const conn = peer.connect(targetId, {
 reliable: true

 });
 // Настройка обработчиков
 setupConnectionHandlers(conn, targetId);

 // Если подключение установлено
 conn.on('open', () => {
 addSystemMessage(`
✅ Подключено
к ${targetId}`);
 connections[targetId] = conn;
 updateUserList();

 conn.send({
 type: 'system',
 text: `${myName} присоединился
к чату`,
 user: myName
 });
 });
 conn.on('error', (err) => {
 addSystemMessage(`
❌ Ошибка подключения: ${err.message}`);
 delete connections[targetId];
 updateUserList();
 });
 }
 // --- Настройка обработчиков для соединения ---
 function setupConnectionHandlers(conn, peerId) {
 // Обработка входящих данных
 conn.on('data', (data) => {
 handleMessage(data, peerId);

 });
 // Закрытие соединения
 conn.on('close', () => {
 delete connections[peerId];
 addSystemMessage(`
🔴 ${peerId} отключился`);
 updateUserList();
 });
 // Ошибки
 conn.on('error', (err) => {
 console.error('Ошибка соединения:', err);
 delete connections[peerId];
 updateUserList();
 addSystemMessage(`
❌ Ошибка
с ${peerId}: ${err.message}`);
 });
 }
 // --- Обработка сообщений ---
 function handleMessage(data, fromPeer) {
 console.log('
📩 Получено от', fromPeer, ':', data);

 if (data.type === 'system') {
 addSystemMessage(data.text);
 return;
 }
 if (data.type === 'message') {
 addMessage(data.user || 'Аноним', data.text, false);
 return;

 }
 if (data.type === 'ping') {
 // Ответ на ping
 if (connections[fromPeer]) {
 connections[fromPeer].send({ type: 'pong' });
 }
 return;
 }
 }
 // --- Отправка сообщения ---
 function sendMessage() {
 const input = document.getElementById('msgInput');
 const text = input.value.trim();
 if (!text) return;
 // Показываем у себя
 addMessage(myName, text, true);
 // Отправляем всем
 const msgData = {
 type: 'message',
 user: myName,
 text: text
 };
 let sentCount = 0;
 for (let id in connections) {
 try {
 connections[id].send(msgData);

 sentCount++;
 } catch (e) {
 console.warn('Не удалось отправить:', e);
 delete connections[id];
 updateUserList();
 }
 }
 if (sentCount === 0) {
 addSystemMessage('
⚠ Нет активных подключений');
 }
 input.value = '';
 input.focus();
 }
 // --- UI: Добавить сообщение ---
 function addMessage(user, text, isOwn = false) {
 const container = document.getElementById('messagesContainer');
 const div = document.createElement('div');
 div.className = 'msg';
 div.innerHTML = `
 <span class="user ${isOwn ? 'me' : ''}">${user}</span>
 <span class="text">${text}</span>
 <span class="time">${new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',
minute:'2-digit'})}</span>
 `;
 container.appendChild(div);
 container.scrollTop = container.scrollHeight;
 }

 function addSystemMessage(text) {
 const container = document.getElementById('messagesContainer');
 const div = document.createElement('div');
 div.className = 'msg';
 div.style.background = '#0a1418';
 div.style.borderColor = '#1a2f2a';
 div.innerHTML = `
 <span class="user" style="color:#6a8f7a;">⚡ Система</span>
 <span class="text" style="color:#8fb0a0; font-style:italic;">${text}</span>
 <span class="time">${new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',
minute:'2-digit'})}</span>
 `;
 container.appendChild(div);
 container.scrollTop = container.scrollHeight;
 }
 // --- UI: Список пользователей ---
 function updateUserList() {
 const container = document.getElementById('userList');
 container.innerHTML = `<span class="user-tag online">🟢 Вы (${myName})</
span>`;

 const ids = Object.keys(connections);
 if (ids.length === 0) {
 const empty = document.createElement('span');
 empty.className = 'user-tag of
fline';
 empty.textContent = '
🔴 Нет подключений';
 container.appendChild(empty);
 }


 ids.forEach(id => {
 const tag = document.createElement('span');
 tag.className = 'user-tag online';
 // Пытаемся получить имя из данных
 let name = id.slice(0, 8);
 if (connections[id] && connections[id]._data) {
 // Не можем получить имя, используем ID
 }
 tag.textContent = `
🟢 ${name}`;
 tag.title = id;
 container.appendChild(tag);
 });
 }
 // --- Копировать ID ---
 function copyPeerId() {
 const input = document.getElementById('myPeerId');
 input.select();
 try {
 document.execCommand('copy');
 addSystemMessage('
📋 ID скопирован
в буфер обмена');
 } catch {
 // Fallback
 navigator.clipboard.writeText(input.value).then(() => {
 addSystemMessage('
📋 ID скопирован
в буфер обмена');
 }).catch(() => {
 addSystemMessage('
⚠ Не удалось скопировать, скопируйте
вручную');
 });
 }

 }
 // --- Сброс соединения ---
 function resetConnection() {
 if (con
firm('Перезапустить соединение?')) {
 for (let id in connections) {
 try { connections[id].close(); } catch(e) {}
 }
 connections = {};
 peer.destroy();
 updateUserList();
 addSystemMessage('
🔄 Перезапуск...');
 setTimeout(() => initPeer(), 1500);
 }
 }
 // --- Проверка соединения (ping) ---
 function pingPeers() {
 for (let id in connections) {
 try {
 connections[id].send({ type: 'ping' });
 } catch(e) {
 delete connections[id];
 updateUserList();
 }
 }
 }
 // --- Enter ---
 document.getElementById('msgInput').addEventListener('keydown', (e) => {

 if (e.key === 'Enter') sendMessage();
 });
 document.getElementById('targetPeerId').addEventListener('keydown', (e) => {
 if (e.key === 'Enter') connectToPeer();
 });
 // --- ЗАПУСК ---
 initPeer();
 // Пинг каждые 30 секунд (проверка соединения)
 setInterval(pingPeers, 30000);
 setInterval(updateUserList, 5000);
 console.log('⚡ P2P Чат запущен!');
</script>
</body>
</html>
