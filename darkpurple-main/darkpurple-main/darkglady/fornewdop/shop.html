<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚡ GLADY · Донат-Витрина</title>
    <style>
        /* ----- GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #080c16;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #d0ece4;
            min-height: 100vh;
            padding: 20px;
        }

        /* ----- ОСНОВНОЙ КОНТЕЙНЕР ----- */
        .shop-system {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(8, 16, 28, 0.92);
            backdrop-filter: blur(12px);
            border: 2px solid #2affb6;
            border-radius: 40px;
            padding: 30px 34px;
            box-shadow: 0 0 60px rgba(42, 255, 182, 0.12);
        }

        /* ----- ШАПКА ----- */
        .shop-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f3f3a;
            padding-bottom: 18px;
            margin-bottom: 28px;
            gap: 16px;
        }

        .shop-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #2affb6, #00d4ff, #b88aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .shop-user {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .shop-user .avatar {
            font-size: 34px;
            cursor: pointer;
            transition: 0.3s;
        }
        .shop-user .avatar:hover {
            transform: scale(1.1) rotate(-5deg);
        }
        .shop-user .name {
            font-weight: 600;
            color: #b3ffd9;
        }
        .shop-user .balance {
            background: #0f1e1e;
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid #2a5a4a;
            font-size: 14px;
            color: #7fffd4;
        }

        /* ----- НАВИГАЦИЯ (вкладки) ----- */
        .shop-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 26px;
            border-bottom: 1px solid #1a2f2a;
            padding-bottom: 14px;
        }

        .shop-nav button {
            background: transparent;
            border: none;
            color: #6a8f7a;
            padding: 8px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.25s;
            font-family: inherit;
            border: 1px solid transparent;
        }
        .shop-nav button:hover {
            color: #d0ece4;
            background: #142a2a;
        }
        .shop-nav button.active {
            background: #2affb6;
            color: #080c16;
            border-color: #2affb6;
            box-shadow: 0 0 30px rgba(42, 255, 182, 0.2);
        }

        /* ----- СТРАНИЦЫ ----- */
        .shop-page {
            display: none;
            animation: fadePage 0.3s ease;
        }
        .shop-page.active {
            display: block;
        }

        @keyframes fadePage {
            0% { opacity: 0.3; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ----- СЕТКА ТОВАРОВ ----- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }

        .product-card {
            background: #0f1e24;
            border-radius: 24px;
            border: 1px solid #1a2f2a;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #2affb6;
            box-shadow: 0 12px 40px rgba(42, 255, 182, 0.08);
        }

        .product-card .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0b141c;
            display: block;
        }

        .product-card .product-image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #0f1e24, #142a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #2a5a4a;
        }

        .product-card .product-info {
            padding: 16px 18px 18px;
        }
        .product-card .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #b3ffd9;
            margin-bottom: 4px;
        }
        .product-card .product-price {
            color: #7fffd4;
            font-size: 20px;
            font-weight: 700;
        }
        .product-card .product-desc {
            color: #8fb0a0;
            font-size: 14px;
            margin: 6px 0 12px;
            line-height: 1.4;
        }
        .product-card .btn-buy {
            background: transparent;
            border: 1px solid #2affb6;
            color: #b0ffe0;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            width: 100%;
            font-size: 15px;
        }
        .product-card .btn-buy:hover {
            background: #2affb6;
            color: #080c16;
            box-shadow: 0 0 30px #2affb6;
        }
        .product-card .btn-buy:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ----- КОРЗИНА ----- */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #0f1e24;
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid #1a2f2a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            background: #0b141c;
        }
        .cart-item .cart-info {
            flex: 1;
        }
        .cart-item .cart-name {
            font-weight: 600;
            color: #b3ffd9;
        }
        .cart-item .cart-price {
            color: #7fffd4;
        }
        .cart-item .btn-remove {
            background: transparent;
            border: 1px solid #ff6b6b;
            color: #ff8a8a;
            padding: 4px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .cart-item .btn-remove:hover {
            background: #ff6b6b;
            color: #080c16;
        }

        .cart-total {
            text-align: right;
            font-size: 22px;
            font-weight: 700;
            color: #b3ffd9;
            margin: 20px 0;
            padding: 16px;
            border-top: 1px solid #1a2f2a;
        }

        /* ----- ВИДЕО-ОТЗЫВЫ ----- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }

        .video-card {
            background: #0f1e24;
            border-radius: 24px;
            border: 1px solid #1a2f2a;
            overflow: hidden;
            transition: 0.3s;
        }
        .video-card:hover {
            border-color: #2affb6;
            transform: translateY(-3px);
        }
        .video-card .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .video-card .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-card .video-info {
            padding: 14px 18px;
        }
        .video-card .video-author {
            font-weight: 600;
            color: #b3ffd9;
        }
        .video-card .video-text {
            color: #8fb0a0;
            font-size: 14px;
            margin-top: 4px;
        }

        /* ----- СООБЩЕНИЯ/ОТЗЫВЫ ----- */
        .message-item {
            background: #0f1e24;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid #1a2f2a;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .message-item:hover {
            border-color: #2a5a4a;
        }
        .message-item .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .message-item .msg-user {
            font-weight: 600;
            color: #b3ffd9;
        }
        .message-item .msg-time {
            font-size: 12px;
            color: #4a7a6a;
        }
        .message-item .msg-text {
            color: #d0ece4;
            line-height: 1.5;
        }
        .message-item .msg-rating {
            color: #ffd93d;
            letter-spacing: 2px;
        }

        /* ----- ФОРМЫ ----- */
        .form-group {
            margin: 16px 0;
        }
        .form-group label {
            display: block;
            color: #8fb0a0;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: #0b141c;
            border: 1px solid #1f3f3a;
            border-radius: 16px;
            padding: 12px 18px;
            color: #d0ece4;
            font-family: inherit;
            font-size: 15px;
            transition: 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #2affb6;
            box-shadow: 0 0 20px rgba(42, 255, 182, 0.05);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-primary {
            background: #2affb6;
            border: none;
            color: #080c16;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
        }
        .btn-primary:hover {
            box-shadow: 0 0 40px rgba(42, 255, 182, 0.3);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #1f3f3a;
            color: #8fb0a0;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
        }
        .btn-secondary:hover {
            border-color: #2affb6;
            color: #b3ffd9;
            background: #142a2a;
        }

        /* ----- АДАПТИВ ----- */
        max-width: 700px {
            .shop-system {
                padding: 16px;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            .shop-header {
                flex-direction: column;
                align-items: start;
            }
        }

        /* ----- СКРОЛЛ ----- */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0b141c;
        }
        ::-webkit-scrollbar-thumb {
            background: #2affb6;
            border-radius: 10px;
        }

        /* уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0f1e24;
            border: 1px solid #2affb6;
            padding: 16px 28px;
            border-radius: 20px;
            color: #d0ece4;
            box-shadow: 0 0 40px rgba(42, 255, 182, 0.1);
            animation: slideUp 0.4s ease;
            z-index: 999;
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="shop-system" id="shopApp">

        <!-- ШАПКА -->
        <div class="shop-header">
            <div class="shop-title">🛒 ДОНАТ · ВИТРИНА</div>
            <div class="shop-user">
                <span class="avatar" id="shopAvatar" title="Двойной клик — сменить">🦊</span>
                <span class="name" id="shopUserName">oldName</span>
                <span class="balance">💰 <span id="userBalance">0
                </span> ₽</span>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <div class="shop-nav">
            <button class="active" data-page="catalog">📦 Товары</button>
            <button data-page="cart">🛒 Корзина (<span id="cartCount">0</span>)</button>
            <button data-page="reviews">🎥 Видео-отзывы</button>
            <button data-page="messages">💬 Сообщения</button>
            <button data-page="addproduct">➕ Добавить товар</button>
        </div>

        <!-- ===== СТРАНИЦА: КАТАЛОГ ===== -->
        <div class="shop-page active" id="page-catalog">
            <div class="products-grid" id="productsContainer">
                <!-- рендер из JS -->
            </div>
        </div>

        <!-- ===== СТРАНИЦА: КОРЗИНА ===== -->
        <div class="shop-page" id="page-cart">
            <div id="cartContainer">
                <!-- рендер из JS -->
            </div>
            <div style="display:flex; gap:16px; flex-wrap:wrap; margin-top:16px;">
                <button class="btn-primary" id="checkoutBtn">💳 Оформить заказ</button>
                <button class="btn-secondary" id="clearCartBtn">🗑 Очистить</button>
            </div>
        </div>

        <!-- ===== СТРАНИЦА: ВИДЕО-ОТЗЫВЫ ===== -->
        <div class="shop-page" id="page-reviews">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
                <h2 style="color:#b3ffd9;">🎥 Видео-отзывы</h2>
                <button class="btn-secondary" id="addVideoBtn">➕ Добавить видео</button>
            </div>
            <div class="video-grid" id="videoContainer">
                <!-- рендер из JS -->
            </div>
        </div>

        <!-- ===== СТРАНИЦА: СООБЩЕНИЯ ===== -->
        <div class="shop-page" id="page-messages">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
                <h2 style="color:#b3ffd9;">💬 Отзывы и сообщения</h2>
                <button class="btn-secondary" id="addMessageBtn">✏️ Написать</button>
            </div>
            <div id="messagesContainer">
                <!-- рендер из JS -->
            </div>
        </div>

        <!-- ===== СТРАНИЦА: ДОБАВИТЬ ТОВАР ===== -->
        <div class="shop-page" id="page-addproduct">
            <h2 style="color:#b3ffd9; margin-bottom:16px;">➕ Добавить товар</h2>
            <div class="form-group">
                <label>Название товара</label>
                <input type="text" id="productNameInput" placeholder="Например: iron_block" />
            </div>
            <div class="form-group">
                <label>Цена (₽)</label>
                <input type="number" id="productPriceInput" placeholder="1-200" />
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="productDescInput" placeholder="Краткое описание..."></textarea>
            </div>
            <div class="form-group">
                <label>Ссылка на изображение (URL)</label>
                <input type="text" id="productImageInput" placeholder="https://example.com/image.jpg" />
                <div style="font-size:13px; color:#4a7a6a; margin-top:4px;">Если оставить пустым — будет иконка-заглушка</div>
            </div>
            <button class="btn-primary" id="addProductBtn">➕ Добавить в каталог</button>
        </div>

    </div>

    <script>
        (function() {
            // ---------- ДАННЫЕ (localStorage) ----------
            const STORAGE_KEY = 'gipsik_shop_data';

            function defaultShopData() {
                return {
                    userName: 'PRIZRAK',
                    userAvatar: '🦊',
                    balance: 0,
                    products: [
                        {
                            id: 'p1',
                            name: 'SKORO',
                            price: 150,
                            desc: '',
                            image: ''
                        },
                        {
                            id: 'p2',
                            name: 'SKORO',
                            price: 3,
                            desc: '',
                            image: ''
                        },
                        {
                            id: 'p3',
                            name: 'SKORO',
                            price: 2,
                            desc: '',
                            image: ''
                        }
                    ],
                    cart: [],
                    videos: [
                        { id: 'v1', url: '1', author: '1', text: '1' },
                        { id: 'v2', url: '1', author: '1', text: '1' }
                    ],
                    messages: [
                        { id: 'm1', user: 'Линк', text: '1', rating: 5, time: '12:00' },
                        { id: 'm2', user: 'Тень', text: '1', rating: 5, time: '11:30' },
                        { id: 'm3', user: 'Кодер', text: 'Удобная система доната. Буду ещё заказывать.', rating: 4, time: '10:15' }
                    ]
                };
            }

            let data = loadData();

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        const def = defaultShopData();
                        for (let key in def) {
                            if (!(key in parsed)) parsed[key] = def[key];
                        }
                        return parsed;
                    }
                } catch (e) { console.warn('Загрузка магазина сброшена'); }
                return defaultShopData();
            }

            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            // ---------- ВСПОМОГАТЕЛЬНЫЕ ----------
            function getTime() {
                return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            }

            function showToast(message) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const div = document.createElement('div');
                div.className = 'toast';
                div.textContent = message;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }

            // ---------- РЕНДЕР ----------
            function renderAll() {
                renderProducts();
                renderCart();
                renderVideos();
                renderMessages();
                updateHeader();
                updateCartCount();
            }

            function renderProducts() {
                const container = document.getElementById('productsContainer');
                container.innerHTML = '';
                data.products.forEach(product => {
                    const div = document.createElement('div');
                    div.className = 'product-card';
                    const imgHtml = product.image ?
                        `<img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />` :
                        '';
                    div.innerHTML = `
                        ${imgHtml}
                        <div class="product-image-placeholder" style="${product.image ? 'display:none;' : ''}">🛒</div>
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">💰 ${product.price} ₽</div>
                            <div class="product-desc">${product.desc || ''}</div>
                            <button class="btn-buy" data-id="${product.id}">🛒 В корзину</button>
                        </div>
                    `;
                    container.appendChild(div);
                });

                // события на кнопки "В корзину"
                document.querySelectorAll('.btn-buy').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        addToCart(id);
                    });
                });
            }

            function renderCart() {
                const container = document.getElementById('cartContainer');
                if (data.cart.length === 0) {
                    container.innerHTML = '<p style="color:#6a8f7a; text-align:center; padding:40px 0;">Корзина пуста 🛒</p>';
                    return;
                }

                let total = 0;
                container.innerHTML = '';
                data.cart.forEach((item, index) => {
                    const product = data.products.find(p => p.id === item.id);
                    if (!product) return;
                    total += product.price * item.quantity;
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <img src="${product.image || ''}" onerror="this.src=''" />
                        <div class="cart-info">
                            <div class="cart-name">${product.name}</div>
                            <div class="cart-price">${product.price} ₽ × ${item.quantity}</div>
                        </div>
                        <button class="btn-remove" data-index="${index}">✕</button>
                    `;
                    container.appendChild(div);
                });

                // итог
                const totalDiv = document.createElement('div');
                totalDiv.className = 'cart-total';
                totalDiv.textContent = `💰 Итого: ${total} ₽`;
                container.appendChild(totalDiv);

                // удаление из корзины
                document.querySelectorAll('.btn-remove').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        data.cart.splice(idx, 1);
                        saveData();
                        renderAll();
                        showToast('🗑 Товар удалён из корзины');
                    });
                });
            }

            function renderVideos() {
                const container = document.getElementById('videoContainer');
                container.innerHTML = '';
                data.videos.forEach(video => {
                    const div = document.createElement('div');div.className = 'video-card';
                    div.innerHTML = `
                        <div class="video-wrapper">
                            <iframe src="${video.url}" allowfullscreen loading="lazy"></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-author">👤 ${video.author}</div>
                            <div class="video-text">${video.text}</div>
                            <button class="btn-secondary" style="margin-top:8px; font-size:12px; padding:4px 16px;" data-id="${video.id}">🗑 Удалить</button>
                        </div>
                    `;
                    container.appendChild(div);
                });

                document.querySelectorAll('.video-card .btn-secondary').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        data.videos = data.videos.filter(v => v.id !== id);
                        saveData();
                        renderAll();
                        showToast('🎥 Видео удалено');
                    });
                });
            }

            function renderMessages() {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'message-item';
                    const stars = '⭐'.repeat(msg.rating || 0) + '☆'.repeat(5 - (msg.rating || 0));
                    div.innerHTML = `
                        <div class="msg-header">
                            <span class="msg-user">${msg.user}</span>
                            <span class="msg-time">${msg.time || ''}</span>
                        </div>
                        <div class="msg-rating">${stars}</div>
                        <div class="msg-text">${msg.text}</div>
                        <button class="btn-secondary" style="margin-top:8px; font-size:12px; padding:4px 16px;" data-id="${msg.id}">🗑 Удалить</button>
                    `;
                    container.appendChild(div);
                });

                document.querySelectorAll('.message-item .btn-secondary').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        data.messages = data.messages.filter(m => m.id !== id);
                        saveData();
                        renderAll();
                        showToast('💬 Сообщение удалено');
                    });
                });
            }

            function updateHeader() {
                document.getElementById('shopUserName').textContent = data.userName;
                document.getElementById('shopAvatar').textContent = data.userAvatar;
                document.getElementById('userBalance').textContent = data.balance;
            }

            function updateCartCount() {
                const count = data.cart.reduce((sum, item) => sum + item.quantity, 0);
                document.getElementById('cartCount').textContent = count;
            }

            // ---------- ДЕЙСТВИЯ ----------
            function addToCart(productId) {
                const product = data.products.find(p => p.id === productId);
                if (!product) return;

                const existing = data.cart.find(item => item.id === productId);
                if (existing) {
                    existing.quantity += 1;
                } else {
                    data.cart.push({ id: productId, quantity: 1 });
                }
                saveData();
                renderAll();
                showToast(`✅ ${product.name} добавлен в корзину`);
            }

            function checkout() {
                if (data.cart.length === 0) {
                    showToast('❌ Корзина пуста');
                    return;
                }

                let total = 0;
                data.cart.forEach(item => {
                    const product = data.products.find(p => p.id === item.id);
                    if (product) total += product.price * item.quantity;
                });

                if (data.balance < total) {
                    showToast(`❌ Недостаточно средств! Нужно ${total} ₽, у вас ${data.balance} ₽`);
                    return;
                }

                data.balance -= total;
                data.cart = [];
                saveData();
                renderAll();
                showToast(`✅ Заказ оформлен на ${total} ₽! Спасибо! ❤️`);
            }

            // ---------- СОБЫТИЯ ----------

            // Навигация
            document.querySelectorAll('.shop-nav button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.shop-nav button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const page = this.dataset.page;
                    document.querySelectorAll('.shop-page').forEach(p => p.classList.remove('active'));
                    document.getElementById('page-' + page).classList.add('active');
                });
            });

            // Оформление заказа
            document.getElementById('checkoutBtn').addEventListener('click', checkout);

            // Очистить корзину
            document.getElementById('clearCartBtn').addEventListener('click', function() {
                if (data.cart.length === 0) return;
                if (confirm('Очистить корзину?')) {
                    data.cart = [];
                    saveData();
                    renderAll();
                    showToast('🗑 Корзина очищена');
                }
            });

            // Добавить товар
            document.getElementById('addProductBtn').addEventListener('click', function() {
                const name = document.getElementById('productNameInput').value.trim();
                const price = parseInt(document.getElementById('productPriceInput').value);
                const desc = document.getElementById('productDescInput').value.trim();
                const image = document.getElementById('productImageInput').value.trim();

                if (!name) { showToast('❌ Введите название'); return; }
                if (isNaN(price) || price <= 0) { showToast('❌ Введите корректную цену'); return; }

                data.products.push({
                    id: generateId(),
                    name: name,
                    price: price,
                    desc: desc || 'Без описания',
                    image: image || ''
                });
                saveData();
                renderAll();
                showToast(`✅ Товар «${name}» добавлен!`);

                // очистить поля
                document.getElementById('productNameInput').value = '';
                document.getElementById('productPriceInput').value = '';
                document.getElementById('productDescInput').value = '';
                document.getElementById('productImageInput').value = '';
            });

            // Добавить видео
            document.getElementById('addVideoBtn').addEventListener('click', function() {
                const url = prompt('Введите URL видео (YouTube embed):\nПример: https://www.youtube.com/embed/dQw4w9WgXcQ');
                if (!url) return;
                const author = prompt('Ваше имя:') || data.userName;
                const text = prompt('Комментарий к видео:') || 'Отличный обзор!';
                data.videos.push({
                    id: generateId(),
                    url: url,
                    author: author,
                    text: text
                });
                saveData();
                renderAll();
                showToast('🎥 Видео добавлено!');
            });

            // Добавить сообщение
            document.getElementById('addMessageBtn').addEventListener('click', function() {
                const user = prompt('Ваше имя:') || data.userName;
                const text = prompt('Ваш отзыв или сообщение:');
                if (!text) return;
                const rating = parseInt(prompt('Оценка (1-5):') || '5');
                data.messages.push({
                    id: generateId(),
                    user: user,
                    text: text,
                    rating: Math.min(5, Math.max(1, rating)),
                    time: getTime()
              });
                saveData();
                renderAll();
                showToast('💬 Сообщение добавлено!');
            });

            // Сменить аватар (двойной клик)
            document.getElementById('shopAvatar').addEventListener('dblclick', function() {
                const emojis = ['🦊', '🐉', '⚡', '🌀', '🌙', '⭐', '🔥', '💠', '🎮', '👾', '🤖', '👻', '🌈', '👑', '💎'];
                const current = data.userAvatar;
                let next = emojis[Math.floor(Math.random() * emojis.length)];
                while (next === current && emojis.length > 1) next = emojis[Math.floor(Math.random() * emojis.length)];
                data.userAvatar = next;
                saveData();
                renderAll();
                showToast(`🔄 Аватар изменён на ${next}`);
            });

            // Сменить имя (двойной клик по имени)
            document.getElementById('shopUserName').addEventListener('dblclick', function() {
                const newName = prompt('Введите новое имя:', data.userName);
                if (newName && newName.trim() !== '') {
                    data.userName = newName.trim();
                    saveData();
                    renderAll();
                    showToast(`✏️ Имя изменено на ${data.userName}`);
                }
            });

            // Пополнить баланс (скрытая функция — клик по балансу)
            document.querySelector('.balance').addEventListener('dblclick', function() {
                const amount = prompt('Пополнить баланс (введите сумму):', '1000');
                if (amount && !isNaN(amount) && Number(amount) > 0) {
                    data.balance += Number(amount);
                    saveData();
                    renderAll();
                    showToast(`💰 Баланс пополнен на ${amount} ₽`);
                }
            });

            // ---------- ИНИЦИАЛИЗАЦИЯ ----------
            renderAll();
            showToast('🛒 Донат-витрина загружена!');

            window.addEventListener('beforeunload', saveData);

        })();
    </script>

</body>
</html>
